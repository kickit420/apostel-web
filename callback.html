<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Autorisierung – Apostel der Deutschen</title>
<style>
  :root{color-scheme:dark}
  body{margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;font-family:Georgia,serif;
    background:radial-gradient(120% 120% at 50% 20%,#1d1d20,#0e0e10 70%);color:#e9e4da;padding:2rem 1.25rem}
  h1{letter-spacing:.1em;font-size:1.4rem}
  code{display:block;max-width:90vw;overflow-wrap:anywhere;background:#000;border:1px solid #8a6d3b;
    color:#f4f1eb;padding:1rem;border-radius:8px;margin:1rem 0;font-family:ui-monospace,monospace;font-size:.9rem}
  button{background:#8a6d3b;color:#fff;border:0;padding:.7rem 1.4rem;border-radius:8px;
    font-size:1rem;cursor:pointer}
  .muted{opacity:.7;font-size:.85rem;max-width:520px}
</style>
</head>
<body>
  <h1>Autorisierung abgeschlossen</h1>
  <p class="muted">Kopiere den Code und gib ihn im Tool ein, um den Token abzurufen.</p>
  <code id="code">–</code>
  <button onclick="navigator.clipboard.writeText(document.getElementById('code').textContent)">Code kopieren</button>
  <p class="muted" id="full"></p>
<script>
  const p = new URLSearchParams(location.search);
  const code = p.get('code');
  document.getElementById('code').textContent = code || '(kein code-Parameter gefunden)';
  document.getElementById('full').textContent = 'Voll-URL: ' + location.href;
</script>
</body>
</html>
